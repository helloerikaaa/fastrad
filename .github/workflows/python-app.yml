name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Astral UV
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        uv pip install --system "pyradiomics @ git+https://github.com/AIM-Harvard/pyradiomics.git"
        uv pip install --system ".[test]"
        
    - name: Lint and Format with Ruff
      run: |
        uv run ruff check .
        
    - name: Type Check with Ty
      run: |
        uv run ty check .
        
    - name: Test with pytest
      run: |
        uv run pytest
